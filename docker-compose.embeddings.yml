# Embedding server for semantic search (Tier 3)
#
# Uses Docker Compose profiles to select GPU or CPU runtime.
# Only one profile can be active at a time (all services share
# the same container_name, so Compose will refuse to start both).
#
# Start with:
#   GPU:  docker compose ... -f docker-compose.embeddings.yml --profile embeddings-gpu up -d
#   CPU:  docker compose ... -f docker-compose.embeddings.yml --profile embeddings-cpu up -d
#   ARM64 (Apple Silicon / ARM servers):
#                    docker compose ... -f docker-compose.embeddings.yml --profile embeddings-arm64 up -d
#
# With no --profile flag, neither TEI service starts — the application
# degrades gracefully (semantic search falls back to FTS).
#
# Platform options:
#   NVIDIA GPU:    Use --profile embeddings-gpu (default for desktop with CUDA GPU)
#   CPU (x86_64):  Use --profile embeddings-cpu (x86 NAS or server without GPU)
#   ARM64 (Docker): Use --profile embeddings-arm64 (Apple Silicon Mac, ARM servers)
#   Apple Silicon (Metal GPU): Run TEI natively via Homebrew for Metal acceleration:
#                  brew tap huggingface/tap
#                  brew install huggingface/tap/text-embeddings-inference
#                  Start with: text-embeddings-router --model-id nomic-ai/nomic-embed-text-v2-moe --port 8090
#                  Then set EMBEDDING_URL=http://host.docker.internal:8090 in .env
#                  and omit this compose file entirely.
#
# The embedding server can also run on a separate machine. Set EMBEDDING_URL accordingly.
#
# Note: depends_on is not used here because Compose does not support
# cross-profile depends_on (the inactive profile's service is treated
# as undefined). The application handles this via graceful degradation —
# isEmbeddingAvailable() checks TEI health before every operation.
# The healthcheck + restart: always policy ensures TEI recovers without
# Compose-level startup ordering.

services:
  # ── GPU profile (NVIDIA CUDA) ──────────────────────────
  embeddings-gpu:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.9
    container_name: context-library-embeddings
    profiles: [embeddings-gpu]
    restart: always
    ports: ['8090:80']
    command: --model-id ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v2-moe} --port 80
    volumes:
      - ./data/models:/data
    networks:
      default:
        aliases:
          - embeddings
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── CPU profile (no GPU required) ──────────────────────
  embeddings-cpu:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: context-library-embeddings
    profiles: [embeddings-cpu]
    restart: always
    ports: ['8090:80']
    command: --model-id ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v2-moe} --port 80
    volumes:
      - ./data/models:/data
    networks:
      default:
        aliases:
          - embeddings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── ARM64 profile (Apple Silicon, ARM servers) ─────────
  embeddings-arm64:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-arm64-1.9
    container_name: context-library-embeddings
    profiles: [embeddings-arm64]
    restart: always
    ports: ['8090:80']
    command: --model-id ${EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v2-moe} --port 80
    volumes:
      - ./data/models:/data
    networks:
      default:
        aliases:
          - embeddings
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Cross-encoder reranker (optional) ──────────────────
  # A second TEI instance running a cross-encoder model that rescores
  # the top candidates from RRF fusion. Add the --profile reranker-gpu,
  # reranker-cpu, or reranker-arm64 flag to enable. When no reranker profile
  # is active, search_context falls back to RRF-only ordering.
  reranker-gpu:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.9
    container_name: context-library-reranker
    profiles: [reranker-gpu]
    restart: always
    ports: ['8091:80']
    command: --model-id ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2} --port 80
    volumes:
      - ./data/models:/data
    networks:
      default:
        aliases:
          - reranker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  reranker-cpu:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: context-library-reranker
    profiles: [reranker-cpu]
    restart: always
    ports: ['8091:80']
    command: --model-id ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2} --port 80
    volumes:
      - ./data/models:/data
    networks:
      default:
        aliases:
          - reranker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  reranker-arm64:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-arm64-1.9
    container_name: context-library-reranker
    profiles: [reranker-arm64]
    restart: always
    ports: ['8091:80']
    command: --model-id ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2} --port 80
    volumes:
      - ./data/models:/data
    networks:
      default:
        aliases:
          - reranker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Context Library overlay ────────────────────────────
  # All embedding services use network alias "embeddings", so
  # EMBEDDING_URL works identically regardless of which profile is active.
  context-library:
    environment:
      - EMBEDDING_URL=http://embeddings:80
      - RERANKER_URL=${RERANKER_URL:-}
