services:
  context-library:
    # build: .  # Uncomment for local builds, comment out 'image:' below
    image: ghcr.io/onideus/context-library:latest
    container_name: context-library
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
