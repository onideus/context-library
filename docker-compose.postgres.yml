services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    container_name: context-library-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-context_library}
      POSTGRES_USER: ${POSTGRES_USER:-cl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cl} -d ${POSTGRES_DB:-context_library}"]
      interval: 10s
      timeout: 5s
      retries: 5

  context-library:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=${POSTGRES_USER:-cl}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - PGDATABASE=${POSTGRES_DB:-context_library}
