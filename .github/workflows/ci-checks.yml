name: ci-checks

on:
  workflow_call:
    secrets:
      SNYK_TOKEN:
        required: true
      NTFY_URL:
        required: false

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: cl_test
          POSTGRES_USER: cl
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cl -d cl_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: cl_test
      PGUSER: cl
      PGPASSWORD: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Snyk dependency scan
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Notify on completion
        if: always()
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            TITLE="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          else
            TITLE="Push to ${{ github.ref_name }}"
          fi
          curl -s -o /dev/null \
            -H "Title: CI ${STATUS}: ${TITLE}" \
            -H "Priority: $( [ "$STATUS" = "success" ] && echo "default" || echo "high" )" \
            -H "Tags: $( [ "$STATUS" = "success" ] && echo "white_check_mark" || echo "x" )" \
            -d "Build ${STATUS} for context-library" \
            "${NTFY_URL:-https://ntfy.sh/context-library-ci}" || true
