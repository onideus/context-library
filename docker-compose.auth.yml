# OAuth 2.1 authentication via mcp-auth-proxy
# Required for exposing Context Library to the internet.
# Requires an OIDC provider (Auth0, Google, etc.)
# See README.md for configuration details.

services:
  mcp-auth-proxy:
    image: ghcr.io/sigbit/mcp-auth-proxy:latest
    container_name: mcp-auth-proxy
    restart: unless-stopped
    command:
      - --external-url
      - ${EXTERNAL_URL:-https://localhost}
      - --tls-cert-file
      - /certs/cert.pem
      - --tls-key-file
      - /certs/key.pem
      - --oidc-configuration-url
      - ${AUTH0_ISSUER}.well-known/openid-configuration
      - --oidc-client-id
      - ${AUTH0_CLIENT_ID}
      - --oidc-client-secret
      - ${AUTH0_CLIENT_SECRET}
      - --oidc-allowed-users
      - ${ALLOWED_USERS}
      - http://context-library:3100
    volumes:
      - ./proxy-data:/data
      - ./proxy-certs:/certs:ro
    expose:
      - "443"

  context-library:
    expose:
      - "3100"
